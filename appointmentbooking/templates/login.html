<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        /* Page background */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        /* Center box */
        .container {
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        /* Heading */
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* Button */
        button {
            width: 100%;
            padding: 10px;
            background-color: #667eea;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #5a67d8;
        }

        /* Footer links */
        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .footer a {
            text-decoration: none;
            color: #667eea;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Error message (optional for Django) */
        .error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }

    </style>
</head>

<body>

    <div class="container">
        <h2>User Login</h2>

        <!-- Optional error message -->
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Enter Username" required>

            <input type="password" name="password" placeholder="Enter Password" required>

            <button type="submit">Login</button>
        </form>

        <div class="footer">
            Don't have an account? <a href="/register/">Register</a>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login / Register Text</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #555;
            margin: 10px 0;
        }

        .highlight {
            color: #007BFF;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Welcome</h1>

        <p class="highlight">Login</p>
        <p>If you have an account</p>

        <p class="highlight">Register</p>
        <p>If you don't have an account</p>
    </div>

</body>
</html>
